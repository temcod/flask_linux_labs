<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <!-- Мобильная адаптация: чтобы страница нормально выглядела на телефоне -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Сколько дней до Нового года?</title>

  <!--
    По заданию статика должна раздаваться через наш endpoint /static/...
    Поэтому здесь абсолютный путь /static/css/styles.css, а не url_for('static', ...)
  -->
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>
  <!--
    Основная "карточка" по центру.
    Число days_left подставляется из Flask (переменная приходит в render_template).
  -->
  <main class="card">
    <h1>До Нового года осталось</h1>

    <div class="counter">
      <!-- Тут просто выводим число, без всяких вычислений в шаблоне -->
      <span class="days">{{ days_left }}</span>
      <span class="label">дней</span>
    </div>

    <p class="hint">Обнови страницу завтра — число изменится 😉</p>

    <div class="footer">
      <!-- Иконка лежит в папке static/images -->
      <img class="tree" src="/static/images/tree.svg" alt="Ёлка" />
      <span>new_year_application</span>
    </div>
  </main>

  <!--
    Снежинки: подключаем JS-файл из static/js.
    Он рисует прозрачный canvas поверх страницы, но клики не перехватывает.
  -->
  <script type="text/javascript" src="/static/js/snowstorm.js"></script>
</body>
</html>
